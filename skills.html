<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Skills</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      background: rgba(0,0,0,0.3);
    }

    header h1 {
      font-size: 40px;
      margin: 0;
    }

    header p {
      color: #cbd5e1;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 40px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      transition: 0.3s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .card:hover {
      transform: translateY(-8px);
      background: rgba(255,255,255,0.15);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #38bdf8;
    }

    .back {
      text-align: center;
      margin: 30px;
    }

    .back a {
      text-decoration: none;
      background: #38bdf8;
      padding: 10px 20px;
      border-radius: 8px;
      color: #000;
      font-weight: bold;
    }

    .back a:hover {
      background: #0ea5e9;
    }
  </style>

</head>
<body>

  <header>
    <h1>My Skills</h1>
    <p>Here are the technologies I work with</p>
  </header>

  <div class="container">

    <div class="card">
      <h3>HTML</h3>
      <p>Structure of web pages</p>
    </div>

    <div class="card">
      <h3>CSS</h3>
      <p>Design and styling</p>
    </div>

    <div class="card">
      <h3>JavaScript</h3>
      <p>Interactive web features</p>
    </div>

    <div class="card">
      <h3>Responsive Design</h3>
      <p>Mobile friendly layouts</p>
    </div>

    <div class="card">
      <h3>Git & GitHub</h3>
      <p>Version control system</p>
    </div>

  </div>

  <div class="back">
    <a href="index.html">← Back to Home</a>
  </div>

</body>
</html>
