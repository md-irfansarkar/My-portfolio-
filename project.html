<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        #projects {
            padding: 40px 20px;
            text-align: center;
            background-color: #f9f9f9;
            font-family: 'Arial', sans-serif;
        }

        #projects h2 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 30px;
        }

        .project-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }

        .project-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 25px;
            width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .project-icon {
            font-size: 2.5rem;
            width: 90px;
            height: 90px;
            background-color: #f0f8ff;
            border: 4px solid #3ba1da;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .project-card h3 {
            margin: 10px 0;
            color: #222;
            font-size: 1.3rem;
        }

        .project-card p {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 20px;
            min-height: 45px;
        }

        .project-btn {
            text-decoration: none;
            background-color: #3ba1da;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.95rem;
            display: inline-block;
            transition: background-color 0.2s ease;
            width: 80%;
        }

        .project-btn:hover {
            background-color: #2a8cc5;
        }
    </style>
</head>
<body>

    <section id="projects">
        <h2>My Projects</h2>
        <div class="project-list">
            
            <div class="project-card">
                <div class="project-icon">📱</div>
                <h3>Project 1</h3>
                <p>Now I am learning web development and version control.</p>
                <a href="#" target="_blank" class="project-btn">View My Work</a>
            </div>

            <div class="project-card">
                <div class="project-icon">🎨</div>
                <h3>Project 2</h3>
                <p>Description of your second project and the technologies used.</p>
                <a href="#" target="_blank" class="project-btn">View My Work</a>
            </div>

            <div class="project-card">
                <div class="project-icon">💻</div>
                <h3>Project 3</h3>
                <p>Description of your third project and the technologies used.</p>
                <a href="#" target="_blank" class="project-btn">View My Work</a>
            </div>

        </div>
    </section>

</body>
</html>
